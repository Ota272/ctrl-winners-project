<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщить об ошибке</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="page">

  <div class="header">
    <a href="project.html" class="back-btn">‹</a>
    <div class="title">Сообщить об ошибке</div>
  </div>

  <div class="section-card">
    <h3>Нашли проблему?</h3>
    <p>
      Если вы заметили ошибку или некорректную работу игры,
      пожалуйста, опишите проблему ниже.
    </p>
  </div>

  <div class="section-card">
    <form>
      <textarea placeholder="Опишите ошибку..." rows="5"
        style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>

      <button type="submit"
        style="margin-top:12px; width:100%; padding:12px;
        border:none; border-radius:10px; background:#2563eb; color:#fff;">
        Отправить
      </button>
    </form>
  </div>

</div>

</body>
</html>
